<!DOCTYPE html>
<html>
<head>
<title>Advanced Cardiac Digital Twin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #0e2a3a, #08151f);
    font-family:Segoe UI;
    color:white;
}

#ui{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

.panel{
    position:absolute;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(12px);
    border-radius:15px;
    padding:15px 20px;
    pointer-events:auto;
    cursor:pointer;
    transition:0.3s;
}

.panel:hover{
    background:rgba(0,255,255,0.15);
}

#topPanel{
    top:20px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

#malePanel{ left:30px; top:150px; }
#femalePanel{ left:30px; bottom:150px; }
#childPanel{ right:30px; top:220px; }

button{
    margin:5px;
    padding:5px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.bpm{
    font-size:22px;
    color:#00f2ff;
}
.status{ font-size:14px; }
</style>
</head>

<body>

<div id="ui">

<div id="topPanel" class="panel">
    <h2>🫀 Digital Twin</h2>
    <div id="mainBPM" class="bpm">-- BPM</div>
    <div id="mainStatus" class="status">Loading...</div>

    <br>
    <button onclick="setView('front')">Front</button>
    <button onclick="setView('top')">Top</button>
    <button onclick="setView('side')">Side</button>
    <button onclick="setView('bottom')">Bottom</button>
</div>

<div id="malePanel" class="panel">Adult Male</div>
<div id="femalePanel" class="panel">Adult Female</div>
<div id="childPanel" class="panel">Child</div>

</div>

<script>

// ================= SCENE =================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 0.8, 5);
camera.lookAt(0, 0.8, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.localClippingEnabled = true;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,0.8));

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

const loader = new THREE.GLTFLoader();

let heartModel;
let pulseSpeed = 0.01;
let baseScale = 0.06;
let blockageMesh;
let clipPlane = new THREE.Plane(new THREE.Vector3(-1,0,0), 0);

// ================= LOAD HEART =================

loader.load("/static/heart.glb", function(gltf){

    heartModel = gltf.scene;

    heartModel.scale.set(baseScale,baseScale,baseScale);
    heartModel.position.set(0,0.8,0);
    heartModel.rotation.set(0,0,0);

    scene.add(heartModel);

    createBlockage();
});

// ================= BLOCKAGE RING =================

function createBlockage(){

    const ringGeo = new THREE.RingGeometry(0.2,0.25,64);
    const ringMat = new THREE.MeshBasicMaterial({
        color:0xff0000,
        side:THREE.DoubleSide,
        wireframe:true
    });

    blockageMesh = new THREE.Mesh(ringGeo, ringMat);
    blockageMesh.position.set(0.3,0.9,0.1);
    blockageMesh.rotation.y = Math.PI/2;
    blockageMesh.visible = false;

    scene.add(blockageMesh);
}

// ================= VIEW SWITCH =================

function setView(view){

    if(view==="front") camera.position.set(0,0.8,5);
    if(view==="top") camera.position.set(0,5,0.01);
    if(view==="side") camera.position.set(5,0.8,0);
    if(view==="bottom") camera.position.set(0,-5,0.01);

    camera.lookAt(0,0.8,0);
}

// ================= ANIMATION =================

function animate(){
    requestAnimationFrame(animate);

    if(heartModel){

        const pulse = 1 + Math.sin(Date.now()*pulseSpeed)*0.1;

        heartModel.scale.set(
            baseScale*pulse,
            baseScale*pulse,
            baseScale*pulse
        );

        const distance = camera.position.length();

        heartModel.traverse(child=>{
            if(child.isMesh){
                child.material.clippingPlanes = distance < 3 ? [clipPlane] : [];
            }
        });
    }

    controls.update();
    renderer.render(scene,camera);
}

animate();

// ================= PATIENT SWITCH =================

document.getElementById("malePanel").onclick = ()=>{
    pulseSpeed = 0.01;
    baseScale = 0.06;
};

document.getElementById("femalePanel").onclick = ()=>{
    pulseSpeed = 0.012;
    baseScale = 0.055;
};

document.getElementById("childPanel").onclick = ()=>{
    pulseSpeed = 0.02;
    baseScale = 0.045;
};

// ================= API =================

async function fetchData(){

    const res = await fetch("/api/health");
    const data = await res.json();

    document.getElementById("mainBPM").innerText = Math.round(data.eeg)+" BPM";

    if(data.status.includes("Abnormal")){
        document.getElementById("mainStatus").innerText = "⚠ Blockage Detected";
        document.getElementById("mainStatus").style.color="red";
        blockageMesh.visible = true;
        pulseSpeed = 0.02;
    } else{
        document.getElementById("mainStatus").innerText = "✔ Normal";
        document.getElementById("mainStatus").style.color="#00ff88";
        blockageMesh.visible = false;
    }
}

setInterval(fetchData,2000);

window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
