<!DOCTYPE html>
<html>
<head>
<title>Advanced Cardiac Digital Twin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background: radial-gradient(circle at center,#020b14,#000000);
font-family:Segoe UI;
color:white;
}

#ui{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.card{
position:absolute;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
pointer-events:auto;
text-align:center;
}

#main{
top:20px;
left:50%;
transform:translateX(-50%);
width:340px;
}

.patient{
width:140px;
cursor:pointer;
}

.patient img{
width:110px;
border-radius:50%;
border:3px solid #00f0ff;
}

#male{ left:30px; top:180px; }
#female{ left:30px; bottom:120px; }
#child{ right:30px; top:220px; }

button{
margin-top:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#00f0ff;
color:black;
}
</style>
</head>

<body>

<div id="ui">

<div id="main" class="card">
<h2>🫀 Cardiac Digital Twin</h2>
<div id="bpm">-- BPM</div>
<div id="status">Loading...</div>

<button onclick="toggleSurgery()">Surgical View</button>
</div>

<div id="male" class="card patient">
<img src="/static/images/male.png">
<div>Adult Male</div>
</div>

<div id="female" class="card patient">
<img src="/static/images/female.png">
<div>Adult Female</div>
</div>

<div id="child" class="card patient">
<img src="/static/images/child.png">
<div>Child</div>
</div>

</div>

<script>

// ================= SCENE =================

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);
camera.position.set(0,0,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.localClippingEnabled = true;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

// ================= LIGHTING =================

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const redLight = new THREE.PointLight(0xff5555,3,50);
redLight.position.set(3,3,5);
scene.add(redLight);

const blueLight = new THREE.PointLight(0x4444ff,2,50);
blueLight.position.set(-3,-3,5);
scene.add(blueLight);

// ================= HEART LOADING =================

const loader = new THREE.GLTFLoader();

let heart;
let pulseSpeed = 0.01;
let baseScale = 1.2;
let blockageRing;

// Load heart model (place your realistic GLB here)
loader.load("/static/heart.glb", function(gltf){

heart = gltf.scene;
heart.scale.set(baseScale,baseScale,baseScale);
heart.position.set(0,0,0);

heart.traverse(child=>{
if(child.isMesh){

child.material.metalness = 0.3;
child.material.roughness = 0.4;

// Highlight valves if detected
if(child.name.toLowerCase().includes("valve")){
child.material.color.set(0xffcc00);
child.material.emissive = new THREE.Color(0x553300);
}
}
});

scene.add(heart);
createBlockageRing();

});

// ================= BLOCKAGE DOTTED RING =================

function createBlockageRing(){

const geometry = new THREE.CircleGeometry(0.7, 64);
geometry.vertices?.shift?.();

const material = new THREE.LineDashedMaterial({
color: 0xff0000,
dashSize: 0.1,
gapSize: 0.1
});

blockageRing = new THREE.LineLoop(geometry, material);
blockageRing.computeLineDistances();
blockageRing.rotation.x = Math.PI/2;
blockageRing.position.set(0.3,0.2,0);
blockageRing.visible = false;

scene.add(blockageRing);
}

// ================= SURGICAL MODE =================

let surgicalMode = false;
const clipPlane = new THREE.Plane(new THREE.Vector3(-1,0,0),0);

function toggleSurgery(){
surgicalMode = !surgicalMode;

if(heart){
heart.traverse(child=>{
if(child.isMesh){
child.material.clippingPlanes = surgicalMode ? [clipPlane] : [];
}
});
}
}

// ================= HEART ANIMATION =================

function animate(){
requestAnimationFrame(animate);

if(heart){
const pulse = 1 + Math.sin(Date.now()*pulseSpeed)*0.08;
heart.scale.set(baseScale*pulse,baseScale*pulse,baseScale*pulse);
}

controls.update();
renderer.render(scene,camera);
}
animate();

// ================= PATIENT SWITCH =================

document.getElementById("male").onclick=()=>{
pulseSpeed=0.01;
baseScale=1.2;
};

document.getElementById("female").onclick=()=>{
pulseSpeed=0.012;
baseScale=1.1;
};

document.getElementById("child").onclick=()=>{
pulseSpeed=0.02;
baseScale=0.9;
};

// ================= API =================

async function fetchData(){
try{
const res = await fetch("/api/health");
const data = await res.json();

document.getElementById("bpm").innerText=Math.round(data.eeg)+" BPM";

if(data.status.includes("Abnormal")){
document.getElementById("status").innerText="⚠ Blockage Detected";
document.getElementById("status").style.color="red";
pulseSpeed=0.02;

if(blockageRing) blockageRing.visible = true;

}else{
document.getElementById("status").innerText="✔ Normal";
document.getElementById("status").style.color="#00ff88";
pulseSpeed=0.01;

if(blockageRing) blockageRing.visible = false;
}
}catch(e){}
}
setInterval(fetchData,2000);

// ================= RESIZE =================

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>
